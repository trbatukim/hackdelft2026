<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokemon Battle Simulator</title>
  <link rel="stylesheet" href="pokemon_battle.css" />
</head>
<body>

  <h1>Pokémon Beach Battle</h1>

  <div id="arena">
    <!-- Enemy HP -->
    <div class="hp-box" id="enemy-hp-box">
      <div class="name" id="enemy-name">PALOSSAND</div>
      <div class="hp-track"><div class="hp-fill high" id="enemy-hp-fill"></div></div>
      <div class="hp-numbers"><span id="enemy-hp-cur">120</span> / <span id="enemy-hp-max">120</span></div>
    </div>

    <!-- Sprites -->
    <img src="imgs/pallosand.png" class="pokemon-sprite" id="enemy-sprite" />
    <img src="imgs/pikachu.png" class="pokemon-sprite" id="player-sprite"></img>

    <!-- Player HP -->
    <div class="hp-box" id="player-hp-box">
      <div class="name" id="player-name">PIKACHU</div>
      <div class="hp-track"><div class="hp-fill high" id="player-hp-fill"></div></div>
      <div class="hp-numbers"><span id="player-hp-cur">100</span> / <span id="player-hp-max">100</span></div>
    </div>
  </div>

  <div id="log"><p class="highlight">A wild PALOSSAND appeared! Choose your move!</p></div>

  <div id="moves">
    <button class="move-btn" data-type="electric" onclick="playerAttack(0)">
      <span class="move-name">THUNDERBOLT</span>
      <span class="move-type-tag">ELECTRIC</span><span class="move-meta">PWR 90</span>
    </button>
    <button class="move-btn" data-type="normal" onclick="playerAttack(1)">
      <span class="move-name">QUICK ATTACK</span>
      <span class="move-type-tag">NORMAL</span><span class="move-meta">PWR 40</span>
    </button>
    <button class="move-btn" data-type="steel" onclick="playerAttack(2)">
      <span class="move-name">IRON TAIL</span>
      <span class="move-type-tag">STEEL</span><span class="move-meta">PWR 100  75%</span>
    </button>
    <button class="move-btn" data-type="electric" onclick="playerAttack(3)">
      <span class="move-name">VOLT TACKLE</span>
      <span class="move-type-tag">ELECTRIC</span><span class="move-meta">PWR 120  recoil</span>
    </button>
  </div>

  <div id="result-text"></div>
  <button hidden="hidden" id="play-again" onclick="resetGame()">Play Again</button>

  <script src="pokemon_battle.js"></script>
</body>
</html>
